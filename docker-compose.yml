services:
  app:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/running_ai?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      INTERNAL_API_BASE_URL: http://app:3000
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      WEB_USER_ID: ${WEB_USER_ID:-}
      WEB_TELEGRAM_ID: ${WEB_TELEGRAM_ID:-}
      USE_MOCK_HEALTH_DATA: "false"
    depends_on:
      - app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: running_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d running_ai"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    depends_on:
      - app
      - web
    environment:
      PUBLIC_BASE_URL_HOSTNAME: ${PUBLIC_BASE_URL_HOSTNAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
